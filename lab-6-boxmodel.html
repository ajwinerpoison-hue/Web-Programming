<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Box Model Lab</title>
<style>
/* Add your CSS here */

.box {
  border: 5px solid blue;      /* 5px solid blue border */
  padding: 20px;               /* 20px padding */
  margin: 20px;                /* 20px margin */
  box-sizing: border-box;      /* Include border and padding in total size */
  background-color: lightgray; /* Background color */
}

</style>
</head>
<body>
<h1>CSS Box Model Lab</h1>
<div class="box">
<p>This is a demonstration of the CSS Box Model.</p>
</div>
</body>
</html>
